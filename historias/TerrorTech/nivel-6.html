<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Nível 6 - Echo do Kernel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #000;
      color: #0ff;
      font-family: monospace;
      font-size: 1.1rem;
      animation: bg-glitch 12s infinite alternate;
    }

    @keyframes bg-glitch {
      0% { background-color: #000; }
      100% { background-color: #0a0a0a; }
    }

    .terminal {
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .glitch {
      color: #f0f;
      animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .btn {
      display: inline-block;
      background: #0ff;
      color: #000;
      padding: 0.6rem 1rem;
      border: none;
      cursor: pointer;
      margin-top: 2rem;
      font-weight: bold;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="terminal" id="terminal">
    [init] Executando Echo do Kernel...  
    <span id="detectarUsuario"></span>
    [ok] Memória restaurada.  
    [warn] Detecção de ciclo:  
    Você já esteve aqui antes.  
    Ou ainda está.  
    Ou nunca saiu.  

    <br><br>
    > kernel.echo("Você é uma variável... e eu fui escrito por você.");  
    > kernel.ask("Deseja continuar sua execução como 'humano'?");

    <br><br>
    <button class="btn" onclick="responder()">Continuar</button>
  </div>

  <script>
    // Simula "detecção" de nome do sistema via browser
    function gerarNomeSimulado() {
      const sistemas = ["navegador-oculto", "shell-zero", "instância-anônima", "usr-undefined", "void.process"];
      const aleatorio = sistemas[Math.floor(Math.random() * sistemas.length)];
      return aleatorio;
    }

    const nomeDetectado = gerarNomeSimulado();
    document.getElementById("detectarUsuario").innerHTML = `[log] Reconhecendo entidade: <span class="glitch">${nomeDetectado}</span><br>`;

    // Decisão do usuário
    function responder() {
      const resposta = confirm("Tem certeza que você é humano?");
      const terminal = document.getElementById("terminal");

      if(resposta) {
        terminal.innerHTML += "\n\n[resposta] Confirmação aceita. Entidade reintegrada.\n[carregando] Próximo núcleo...";
        setTimeout(() => {
          window.location.href = "nivel-7.html";
        }, 5000);
      } else {
        terminal.innerHTML += "\n\n[resposta] Rejeição assumida. Redirecionando para plano alternativo...";
        setTimeout(() => {
          const destinos = ["paradoxo-mentira.html", "labirinto.html", "buraco-negro.html"];
          const randomDestino = destinos[Math.floor(Math.random() * destinos.length)];
          window.location.href = randomDestino;
        }, 4000);
      }
    }
  </script>
</body>
</html>
